<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>钢筋点根</title>
  <style>
    :root { --bg:#f5f7fb; --card:#fff; --accent:#0f766e; --text:#0f172a; --muted:#64748b; --error:#b91c1c; --ok:#047857; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:linear-gradient(180deg,#ecfeff 0%,var(--bg) 35%,#eef2ff 100%); color:var(--text); }
    .wrap { max-width:760px; margin:0 auto; padding:16px; }
    .title { font-size:24px; font-weight:700; margin:10px 4px 16px; }
    .card { background:var(--card); border-radius:14px; padding:16px; box-shadow:0 10px 30px rgba(15,23,42,.08); margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:1fr; gap:10px; }
    .tips { margin:0; padding-left:18px; color:#334155; line-height:1.6; }
    .tips li { margin:4px 0; }
    .example-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
    .example-card { border:1px solid #cbd5e1; border-radius:10px; overflow:hidden; background:#f8fafc; }
    .example-head { padding:8px 10px; font-size:12px; font-weight:700; }
    .example-head.good { background:#dcfce7; color:#166534; }
    .example-head.bad { background:#fee2e2; color:#991b1b; }
    .example-img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#e2e8f0; }
    .example-note { padding:8px 10px; font-size:12px; color:#475569; min-height:44px; }
    label { font-size:14px; font-weight:600; }
    input, button { width:100%; border-radius:10px; border:1px solid #cbd5e1; padding:10px; font-size:14px; }
    button { background:var(--accent); color:#fff; border:none; font-weight:700; margin-top:8px; }
    .status { color:var(--muted); font-size:13px; margin-top:6px; }
    .result-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .pill { display:inline-block; background:#ccfbf1; color:#115e59; padding:3px 8px; border-radius:999px; font-size:12px; margin-right:6px; margin-bottom:4px; }
    .overlay-img { width:100%; border-radius:10px; border:1px solid #cbd5e1; margin-top:10px; }
    .error { color:var(--error); }
    .ok { color:var(--ok); }
    @media (max-width:600px){ .result-grid { grid-template-columns:1fr; } .title{ font-size:20px; } .example-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">钢筋点根</div>
    <div class="card">
      <div style="font-weight:700; margin-bottom:8px;">拍摄规范（提升计数准确率）</div>
      <ul class="tips">
        <li>镜头尽量正对钢筋端头面，减少斜拍。</li>
        <li>主簇完整入镜，边缘留 5%-10% 空间，避免切边。</li>
        <li>先对焦端头再拍，确保清晰，避免抖动和拖影。</li>
        <li>避开强反光和阴影，保持端头亮度均匀。</li>
        <li>减少地面石块、杂物进入主簇区域，降低误检。</li>
      </ul>
      <div class="example-grid">
        <div class="example-card">
          <div class="example-head good">正例 A1（精准）</div>
          <img class="example-img" src="/api/v1/sample-image/8509E501" alt="正例 A1" loading="lazy" />
          <div class="example-note">端头正对、簇完整、背景干净，计数稳定。</div>
        </div>
        <div class="example-card">
          <div class="example-head good">正例 A2（精准）</div>
          <img class="example-img" src="/api/v1/sample-image/1E5FB1FF" alt="正例 A2" loading="lazy" />
          <div class="example-note">端头清晰且大小均匀，漏检风险低。</div>
        </div>
        <div class="example-card">
          <div class="example-head bad">反例 D1（过检）</div>
          <img class="example-img" src="/api/v1/sample-image/E42F504E" alt="反例 D1" loading="lazy" />
          <div class="example-note">角度和背景干扰大，容易把非端头区域计入。</div>
        </div>
        <div class="example-card">
          <div class="example-head bad">反例 D2（漏检）</div>
          <img class="example-img" src="/api/v1/sample-image/CC61344D" alt="反例 D2" loading="lazy" />
          <div class="example-note">端头不完整或角度偏斜，容易漏检。</div>
        </div>
      </div>
    </div>
    <div class="card">
      <form id="capture-form" class="grid">
        <label>项目名称<input name="project_name" required /></label>
        <label>批次<input name="batch" required /></label>
        <label>库区<input name="yard" required /></label>
        <label>拍摄人<input name="photographer" required /></label>
        <label>拍摄时间<input type="datetime-local" name="captured_at" required /></label>
        <label>现场图片（必传）<input type="file" name="image" accept="image/*" capture="environment" required /></label>
        <button id="submit-btn" type="submit">提交识别任务</button>
        <div id="status" class="status">等待提交</div>
      </form>
    </div>

    <div class="card">
      <div style="font-weight:700; margin-bottom:8px;">识别结果</div>
      <div id="result-empty" class="status">暂无结果</div>
      <div id="result" style="display:none;"></div>
    </div>
  </div>
  <script>
    const form = document.getElementById("capture-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const resultEl = document.getElementById("result");
    const resultEmptyEl = document.getElementById("result-empty");

    const setStatus = (msg, cls="status") => { statusEl.className = cls; statusEl.textContent = msg; };

    function renderResult(data) {
      resultEmptyEl.style.display = "none";
      resultEl.style.display = "block";
      const anomalies = (data.anomaly_codes || []).map(code => `<span class="pill">${code}</span>`).join("") || "无";
      const regions = data.detection_regions || [];
      const headCount = (data.rebar_head_count ?? data.detected_head_count ?? 0);
      const method = data.detection_method || "unknown";
      const overlayHtml = data.overlay_image_b64
        ? `<div style="margin-top:10px;"><strong>检测框叠加图：</strong><img class="overlay-img" src="data:image/jpeg;base64,${data.overlay_image_b64}" alt="overlay" /></div>`
        : "";

      resultEl.innerHTML = `
        <div class="result-grid">
          <div><strong>钢筋端头数：</strong>${headCount}</div>
          <div><strong>估算重量(kg)：</strong>${data.estimated_weight_kg}</div>
          <div><strong>捆区域数：</strong>${data.bundle_count}</div>
          <div><strong>置信度：</strong>${(data.confidence_score * 100).toFixed(1)}%</div>
        </div>
        <div style="margin-top:10px;"><strong>检测方法：</strong>${method}</div>
        <div style="margin-top:10px;"><strong>检测框数量：</strong>${regions.length}</div>
        <div style="margin-top:10px;"><strong>规格编码：</strong>${data.normalized_spec_code || "未识别"}</div>
        <div style="margin-top:10px;"><strong>吊牌字段：</strong>${JSON.stringify(data.ocr_fields)}</div>
        <div style="margin-top:10px;"><strong>异常标签：</strong>${anomalies}</div>
        <div style="margin-top:10px;"><strong>补拍建议：</strong>${data.retake_advice}</div>
        <div style="margin-top:10px;"><strong>模型权重：</strong>${data.model_path || ""}</div>
        ${overlayHtml}`;
    }

    async function pollTask(taskId) {
      for (let i = 0; i < 45; i += 1) {
        await new Promise(r => setTimeout(r, 1000));
        const resp = await fetch(`/api/v1/tasks/${taskId}`);
        if (!resp.ok) throw new Error("查询任务失败");
        const status = await resp.json();
        setStatus(`任务状态：${status.status}`);
        if (status.status === "FAILED") throw new Error(status.error_message || "任务处理失败");
        if (status.status === "DONE") {
          const r = await fetch(`/api/v1/tasks/${taskId}/result`);
          if (!r.ok) throw new Error("结果获取失败");
          renderResult(await r.json());
          setStatus("识别完成", "status ok");
          return;
        }
      }
      throw new Error("轮询超时");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      setStatus("正在提交任务...");
      try {
        const fd = new FormData(form);
        const metadata = {
          project_name: fd.get("project_name"),
          batch: fd.get("batch"),
          yard: fd.get("yard"),
          photographer: fd.get("photographer"),
          captured_at: new Date(fd.get("captured_at")).toISOString(),
        };

        const payload = new FormData();
        payload.append("metadata", JSON.stringify(metadata));
        payload.append("image", fd.get("image"));
        const tagImage = fd.get("tag_image");
        if (tagImage && tagImage.size > 0) payload.append("tag_image", tagImage);

        const resp = await fetch("/api/v1/tasks", { method: "POST", body: payload });
        if (!resp.ok) throw new Error(await resp.text());

        const data = await resp.json();
        setStatus(`任务已创建：${data.task_id}`);
        await pollTask(data.task_id);
      } catch (err) {
        setStatus(err.message || "请求失败", "status error");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
